name: Unit Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/pr-tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/pr-tests.yml'
  release:
    types: [created]
  workflow_dispatch:

jobs:
  test:
    name: tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Broad Linux coverage across the full supported range.
          - os: ubuntu-latest
            python-version: '3.9'
          - os: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu-latest
            python-version: '3.11'
          - os: ubuntu-latest
            python-version: '3.12'
          - os: ubuntu-latest
            python-version: '3.13'
          - os: ubuntu-latest
            python-version: '3.14'
          # Keep spot checks on the other hosted runners to control matrix size.
          - os: windows-latest
            python-version: '3.10'
          - os: windows-latest
            python-version: '3.13'
          - os: macos-latest
            python-version: '3.12'
          - os: macos-latest
            python-version: '3.14'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        pip install pytest pytest-cov build pandas pyarrow pyarrow-hotfix toml
        pip install .

    - name: Build package
      run: python -m build

    - name: Run tests with coverage
      run: pytest --cov=src --cov-report=xml --junitxml=pytest-results.xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'

    - name: Upload pytest results
      uses: actions/upload-artifact@v7
      with:
        name: pytest-results-${{ matrix.os }}-py${{ matrix.python-version }}
        path: pytest-results.xml
      if: ${{ always() }}

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && success()

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: twine upload dist/*
